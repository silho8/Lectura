<svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- A futuristic, pixel-style logo for "Lectura" -->
  <defs>
    <style>
      .pixel { font-family: 'Pixelify Sans', sans-serif; font-size: 28px; }
      .glow { filter: url(#glow); }
      .text-accent { fill: #FFFF00; } /* Yellow */
      .text-primary { fill: #00FFFF; } /* Cyan */
    </style>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- L -->
  <rect x="0" y="0" width="4" height="24" fill="#00FFFF"/>
  <rect x="4" y="20" width="12" height="4" fill="#00FFFF"/>

  <!-- E -->
  <rect x="20" y="0" width="4" height="24" fill="#00FFFF"/>
  <rect x="24" y="0" width="12" height="4" fill="#00FFFF"/>
  <rect x="24" y="10" width="10" height="4" fill="#00FFFF"/>
  <rect x="24" y="20" width="12" height="4" fill="#00FFFF"/>

  <!-- C -->
  <rect x="40" y="0" width="4" height="24" fill="#00FFFF"/>
  <rect x="44" y="0" width="12" height="4" fill="#00FFFF"/>
  <rect x="44" y="20" width="12" height="4" fill="#00FFFF"/>

  <!-- T -->
  <rect x="60" y="0" width="16" height="4" fill="#00FFFF"/>
  <rect x="66" y="4" width="4" height="20" fill="#00FFFF"/>

  <!-- U -->
  <rect x="80" y="0" width="4" height="20" fill="#00FFFF"/>
  <rect x="92" y="0" width="4" height="20" fill="#00FFFF"/>
  <rect x="84" y="20" width="8" height="4" fill="#00FFFF"/>

  <!-- R -->
  <rect x="100" y="0" width="4" height="24" fill="#00FFFF"/>
  <rect x="104" y="0" width="12" height="4" fill="#00FFFF"/>
  <rect x="104" y="10" width="12" height="4" fill="#00FFFF"/>
  <rect x="112" y="4" width="4" height="6" fill="#00FFFF"/>
  <rect x="108" y="14" width="4" height="4" fill="#00FFFF"/>
  <path d="M112 18 L116 24" stroke="#00FFFF" stroke-width="4"/>

  <!-- Accent dot -->
  <rect x="116" y="28" width="4" height="4" fill="#FFFF00" class="glow"/>
</svg>